name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to build (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build:
    needs: test
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET"
      - name: Package
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          # Validate tag shape — tags we care about are "v<semver>".
          case "$TAG" in
            v[0-9]*) ;;
            *) echo "refusing tag: $TAG" >&2; exit 1 ;;
          esac
          case "$TARGET" in
            x86_64-unknown-linux-gnu|aarch64-apple-darwin|x86_64-apple-darwin) ;;
            *) echo "refusing target: $TARGET" >&2; exit 1 ;;
          esac

          pkg="directive-memory-${TAG}-${TARGET}"
          mkdir -p "dist/${pkg}"
          cp "target/${TARGET}/release/directive-memory" "dist/${pkg}/"
          cp README.md LICENSE config.example.toml "dist/${pkg}/"
          cd dist
          tar -czf "${pkg}.tar.gz" "${pkg}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
          else
            shasum -a 256 "${pkg}.tar.gz" > "${pkg}.tar.gz.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          case "$TAG" in
            v[0-9]*) ;;
            *) echo "refusing tag: $TAG" >&2; exit 1 ;;
          esac
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" dist/*.tar.gz dist/*.tar.gz.sha256 --clobber --repo "$GITHUB_REPOSITORY"
